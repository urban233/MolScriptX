name: Build MolScriptX RPM (openSUSE)
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:
jobs:
  build-rpm-suse:
    runs-on: ubuntu-latest
    container: opensuse/leap:15.6
    steps:
      - name: Install Checkout Dependencies
        run: |
          zypper refresh
          zypper install -y tar gzip git

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install openSUSE Build Dependencies
        run: |
          zypper install -y gcc make bison freeglut-devel libjpeg8-devel libpng16-devel zlib-devel gd-devel libXmu-devel libX11-devel libXext-devel rpm-build

      - name: Install Ruby 3
        run: |
          zypper install -y ruby3.2 ruby3.2-devel ruby3.2-rubygems

      - name: Install FPM
        run: |
          gem3.2 install fpm --no-document

      - name: Compile MolScript and MolAuto
        run: |
          cd code
          make -f Makefile.complete clean || true
          make -f Makefile.complete

      - name: Package RPM using FPM
        run: |
          FPM=$(find / -name fpm -type f 2>/dev/null | grep -v '/gems/fpm' | head -1)
          # Fallback: find the wrapper script installed by gem3.2
          if [ -z "$FPM" ]; then
            FPM=$(find / -name fpm 2>/dev/null | head -1)
          fi
          echo "Found fpm at: $FPM"

          mkdir -p pkg_root/usr/local/bin
          cp molscript pkg_root/usr/local/bin/
          cp molauto pkg_root/usr/local/bin/

          $FPM -s dir -t rpm \
            -n "molscript" \
            -v "2.1.2" \
            --iteration "1.opensuse" \
            --description "Classic 1990s structural biology rendering tool." \
            -d "freeglut" \
            -d "libjpeg8" \
            -d "libpng16-16" \
            -d "gd" \
            -d "libXmu6" \
            -d "libX11-6" \
            -d "libXext6" \
            -d "libz1" \
            -C pkg_root .

      - name: Upload RPM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: molscript-opensuse-rpm
          path: "*.rpm"
          retention-days: 14
